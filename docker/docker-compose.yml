version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: diplom-qdrant
    ports:
      - "6333:6333"     # HTTP API
      - "6334:6334"     # gRPC (на будущее)
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: diplom-minio
    ports:
      - "9010:9000"     # S3 API
      - "9011:9001"     # Web Console
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  qdrant_storage:
  minio_data:
